global
	pidfile /home/offloader/logs/haproxy.pid
	ssl-passphrase-file /tempfs/cert.pass
	user offloader
	group offloader
	daemon 
	nbthread 16
	tune.ssl.cachesize 200000
	tune.ssl.lifetime 7200
	stats socket /home/offloader/logs/haproxy.sock mode 600 level admin expose-fd listeners
	maxconn 60000
	log /var/run/log local0
	ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
	set-var proc.health str("health")

defaults
	mode http
	log global
	timeout client 20s
	timeout server 900s
	timeout http-request 20s
	option forwardfor header LB_SSL_REMOTE_IP
	compression algo gzip
	compression type text/plain text/css application/javascript text/javascript application/json application/x-javascript text/xml application/xml
	log-format "[%t] %ci:%cp %{+Q}[var(txn.host)] %HP %HV %ST %B %Tt %{+Q}[var(req.req_id)] %Tc %Tr %tsc %{+Q}[var(txn.req_base)] %{+Q}[var(txn.backend)] ug:%b ua:%s %sslc %sslv %[ssl_fc_is_resumed] %hrl"
	timeout connect	 10s

http-errors errorpage
	errorfile 500 /home/offloader/haproxy/pages/500.html
	errorfile 502 /home/offloader/haproxy/pages/502.html
	errorfile 503 /home/offloader/haproxy/pages/503.html
	errorfile 504 /home/offloader/haproxy/pages/504.html

frontend http80-https443
	bind :80
	bind :443 alpn http/1.1 default-crt /home/offloader/haproxy/cert/Wild-zohogac-LE ssl crt /home/offloader/haproxy/cert/ tls-ticket-keys /tempfs/L7-Haproxy.keys ssl-min-ver TLSv1.2 ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:EECDH+aRSA+AES+SHA256:EECDH+aRSA+AES+SHA384:EECDH+aRSA+AES128+SHA:EECDH+aRSA+AES256+SHA:!aNULL:!eNULL:!LOW:!MD5:!EXP:!PSK:!SRP:!DSS:!3DES
	http-request redirect scheme https code 301 unless { ssl_fc }
	http-request set-var(txn.host) req.hdr(Host)
	http-request set-var(txn.req_base) base
	monitor-uri /grid/login/servercheck.jsp
	monitor fail if { var(proc.health),map_reg(/home/offloader/logs/health_status.map) -m str "down" }
	http-request set-var(req.req_id) unique-id
	http-request set-header LB_REQUEST_ID %[var(req.req_id)]
	http-response set-header ZALB_REQUEST_ID %[var(req.req_id)]
	http-response set-header Strict-Transport-Security "max-age=64072000; includeSubDomains;"
	errorfiles errorpage

	http-request deny deny_status 403 if !{ src 172.20.65.44 }

	acl waf_host_3905173 req.hdr(Host) -i cliq.zoho.com chat.zoho.com
	http-request set-header LB_WAF_SIMULATION "Rule: block" if waf_host_3905173 { src 172.20.133.235 }
	http-request deny deny_status 403 if waf_host_3905173 !{ req.hdr(Host) -m str www-detran-parana-gov-br.zohosites.com } !{ req.hdr(Host) -m str detranparanahome.zohosites.com } !{ req.hdr(Host) -m str www-portalmeudetrngov.zohosites.com }
	http-request set-header LB_WAF_SIMULATION "Rule: testing" if waf_host_3905173 { path -m str path }


	acl domain_path_7268119 base -m reg ^(cliq.zoho.com|chat.zoho.com)/(.*/)?(_wms)
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_7268119 { cook(cookie1) -m str c1 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_7268119 { cook(cookie2) -m str c2 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_7268119 { url_param(query1) -m str q1 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_7268119 { url_param(query2) -m str q2 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_7268119 { hdr(header1) -m str h1 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_7268119 { hdr(header2) -m reg -i h2 } !{ var(txn.backend) -m found }

	acl domain_path_12425045 base -m reg ^(cliq.zoho.com|chat.zoho.com)/starts/
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_12425045 { cook(cookie1) -m str c1 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_12425045 { cook(cookie2) -m str c2 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_12425045 { url_param(query1) -m str q1 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_12425045 { url_param(query2) -m str q2 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_12425045 { hdr(header2) -m reg -i h2 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_12425045 { hdr(header3) -m found } !{ var(txn.backend) -m found }

	acl domain_path_14670163 base -m reg ^(cliq.zoho.com|chat.zoho.com)/path12/
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_14670163 { cook(cookie2) -m str c2 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_14670163 { url_param(query2) -m str q2 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_14670163 { hdr(header3) -m found } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_14670163 !{ hdr(header4) -m found } !{ var(txn.backend) -m found }

	acl domain_path_3905177 base -m reg ^(cliq.zoho.com|chat.zoho.com)/
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_3905177 { cook(cookie1) -m str c1 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_3905177 { url_param(query1) -m str q1 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_3905177 { hdr(header1) -m str h1 } !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_3905177 !{ hdr(header4) -m found } !{ var(txn.backend) -m found }

	acl domain_path_13840509 base -m reg ^(testhadddomain1649.localzoho.com)/new12345/
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_13840509 { cook(cookie1) -m str c1 } !{ var(txn.backend) -m found }

	acl domain_path_13840508 base -m reg ^(testhadddomain1649.localzoho.com)/
	http-request set-var(txn.backend) str(L7-3667005.https) if domain_path_13840508 { cook(cookie1) -m str c1 } !{ var(txn.backend) -m found }

	http-request set-var(txn.backend) base,map_reg(/home/offloader/haproxy/conf/haproxy-L7-Haproxy-80-443.map) if !{ var(txn.backend) -m found }
	http-request set-var(txn.backend) base,map_reg(/home/offloader/haproxy/conf/haproxy-default-L7-Haproxy-80-443.map) if !{ var(txn.backend) -m found }
	http-request deny deny_status 400 if !{ var(txn.backend) -m found }

	#Rate limiting - track sc0 by host
	http-request track-sc0 req.hdr(Host),lower table st_ratelimit_host
	http-request set-var(txn.rl_current_rate) sc_http_req_rate(0,st_ratelimit_host)

	#Implicit rate limiting
	http-request set-var(txn.rl_implicit) req.hdr(Host),lower,map_reg(/home/offloader/haproxy/conf/haproxy-ratelimit-implicit-L7-Haproxy.map)
	http-request set-var(txn.rl_rate) var(txn.rl_implicit),field(1,\,)
	http-request set-var(txn.rl_mode) var(txn.rl_implicit),field(2,\,)
	acl rl_implicit_exists var(txn.rl_implicit) -m found
	acl rl_implicit_exceeded var(txn.rl_current_rate),sub(txn.rl_rate) -m int gt 0
	acl rl_implicit_dryrun var(txn.rl_mode) -m int eq 1
	http-request set-var(txn.rl_dryrun_log) var(txn.rl_dryrun_log),concat(|rl_implicit) if rl_implicit_exists rl_implicit_exceeded rl_implicit_dryrun { var(txn.rl_dryrun_log) -m found }
	http-request set-var(txn.rl_dryrun_log) str(rl_implicit) if rl_implicit_exists rl_implicit_exceeded rl_implicit_dryrun !{ var(txn.rl_dryrun_log) -m found }
	http-request deny deny_status 429 if rl_implicit_exists rl_implicit_exceeded !rl_implicit_dryrun
	#Explicit rate limiting (per-rule, shared table st_explicit_rl)
	
	#Capture ACL variable values
	http-request set-var(txn.rl_acl_host) req.hdr(Host),lower
	http-request set-var(txn.rl_acl_ip) src
	
	#Explicit rate limiting - host + ACL var:ip (sc1, composite)
	http-request set-var(txn.rl_host) req.hdr(Host),lower
	http-request set-var(txn.rl_key_host_ip) req.hdr(Host),lower,concat(:,txn.rl_host),concat(:,txn.rl_acl_ip)
	http-request track-sc1 var(txn.rl_key_host_ip) table st_explicit_rl
	http-request set-var(txn.rl_host_ip_cur_rate) sc_http_req_rate(1,st_explicit_rl)
	
	#Explicit rate limiting - ip (sc2)
	http-request set-var(txn.rl_ip) src
	http-request set-var(txn.rl_key_ip) req.hdr(Host),lower,concat(:,txn.rl_ip)
	http-request track-sc2 var(txn.rl_key_ip) table st_explicit_rl
	http-request set-var(txn.rl_ip_cur_rate) sc_http_req_rate(2,st_explicit_rl)
	
	#Explicit rate limiting - host
	http-request set-var(txn.rl_host_cur_rate) sc_http_req_rate(0,st_ratelimit_host)
	
	#Rule 15302207 (host, enforce)
	acl rl_15302207_host req.hdr(Host),lower -m str cliq.zoho.com chat.zoho.com chat-ro.zoho.com cliq-ro.zoho.com
	acl rl_15302207_exceeded var(txn.rl_host_cur_rate) -m int gt 1000
	http-request deny deny_status 429 if rl_15302207_host rl_15302207_exceeded
	
	#Rule 15302209 (ip + ACL var:host, enforce)
	acl rl_15302209_host req.hdr(Host),lower -m str cliq.zoho.com chat.zoho.com chat-ro.zoho.com cliq-ro.zoho.com
	acl rl_15302209_exceeded var(txn.rl_host_ip_cur_rate) -m int gt 2000
	acl rl_15302209_acl_hit var(txn.rl_acl_host) -m str test.localzoho.com test1.localzoho.com
	http-request deny deny_status 429 if rl_15302209_host rl_15302209_exceeded !rl_15302209_acl_hit
	
	#Rule 15302211 (ip + ACL var:ip, enforce)
	acl rl_15302211_host req.hdr(Host),lower -m str cliq.zoho.com chat.zoho.com chat-ro.zoho.com cliq-ro.zoho.com
	acl rl_15302211_exceeded var(txn.rl_ip_cur_rate) -m int gt 7000
	acl rl_15302211_acl_hit var(txn.rl_acl_ip) -m str 172.20.94.198
	http-request deny deny_status 429 if rl_15302211_host rl_15302211_exceeded rl_15302211_acl_hit

	#Cluster-level rate limiting (catch-all, sc0)
	http-request set-var(txn.rl_cluster_rate) int(600000)
	http-request set-var(txn.rl_cluster_mode) int(0)
	acl rl_cluster_exceeded var(txn.rl_current_rate),sub(txn.rl_cluster_rate) -m int gt 0
	acl rl_cluster_dryrun var(txn.rl_cluster_mode) -m int eq 1
	http-request set-var(txn.rl_dryrun_log) var(txn.rl_dryrun_log),concat(|rl_cluster) if rl_cluster_exceeded rl_cluster_dryrun { var(txn.rl_dryrun_log) -m found }
	http-request set-var(txn.rl_dryrun_log) str(rl_cluster) if rl_cluster_exceeded rl_cluster_dryrun !{ var(txn.rl_dryrun_log) -m found }
	http-request deny deny_status 429 if rl_cluster_exceeded !rl_cluster_dryrun
	use_backend %[var(txn.backend)]

